name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 🔍 Checkout My Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Kendi token'ını kullanarak yazma yetkisini garantiye alıyoruz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync from Original Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Uzak sunucuyu (upstream) ayarla
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          # Ana dala geç ve birleştir
          git checkout main
          
          # Çakışmaları otomatik çöz ve birleştir
          git merge upstream/master --allow-unrelated-histories -X theirs || echo "No changes to merge"
          
          # Kendi repona gönder (origin)
          # Uzak adresi token ile güncelleyerek yetki hatasını bypass ediyoruz
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
          
      - name: 🚀 FTP Deploy to Hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.github*
