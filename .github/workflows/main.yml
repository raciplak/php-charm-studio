name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_SYNC_TOKEN }}

      - name: 🔄 Sync From Upstream
        env:
          MY_TOKEN: ${{ secrets.MY_SYNC_TOKEN }}
        run: |
          # 1. Git Ayarları
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Upstream Ayarı
          git remote remove upstream || true
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          
          # 3. Veriyi Çek (Artık main olduğunu biliyoruz)
          git fetch upstream main
          
          # 4. Kendi dalını güncelle
          git checkout main
          
          # HATA ÇÖZÜMÜ: Komutu sadeleştirdik, artık '>' hatası vermeyecek
          git reset --hard upstream/main
          
          # 5. Kendi repona yükle
          git push "https://x-access-token:${MY_TOKEN}@github.com/${{ github.repository }}.git" main --force

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          exclude: |
            **/.git*
            **/.github*
