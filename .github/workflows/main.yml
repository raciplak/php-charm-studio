name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout My Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync from Original Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Orijinal repoyu ekle
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          # Mevcut dalda olduğumuzdan emin olalım
          git checkout main
          
          # Merge işlemini dene, eğer bir şey yoksa hata verme (|| true)
          git merge upstream/master --allow-unrelated-histories -X theirs || echo "No changes to merge"
          
          # Sadece değişiklik varsa push yap
          git push origin main || echo "Nothing to push to GitHub"

      - name: 🚀 FTP Deploy to Hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          # Kritik: FTP bağlantı hatalarını önlemek için pasif modu zorla
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.github*
