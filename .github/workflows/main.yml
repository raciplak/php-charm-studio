name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout My Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔄 Sync from Original Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Orijinal repoyu ekle ve çek
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          # Force Merge (Zorlayarak Birleştirme)
          # Bu komut, senin main dalını upstream/master ile tamamen eşitler
          git checkout main
          git reset --hard upstream/master
          
          # Kendi repona zorla gönder (Permission hatasını bu aşar)
          git push origin main --force

      - name: 🚀 FTP Deploy to Hosting
        # Sürüm numarasını v4.3.5 yerine v4 kullanarak daha stabil hale getirdik
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.github*
