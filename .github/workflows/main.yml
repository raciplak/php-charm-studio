name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout My Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync from Original Repo
        run: |
          # Git güvenliği için sahiplik ayarı (Exit 128 çözümü)
          git config --global --add safe.directory /github/workspace
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Orijinal repoyu (upstream) ekle
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          # Kendi 'main' dalına geç ve orijinal 'master' ile eşitle
          git checkout main
          git reset --hard upstream/master
          
          # Kendi repona (origin) zorla gönder
          git push origin main --force

      - name: 🚀 FTP Deploy to Hosting
        # Sürüm numarasını tam ve doğru büyük/küçük harfle yazdık
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.github*
