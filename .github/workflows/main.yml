name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Kendi oluşturduğun anahtarı kullanıyoruz
          token: ${{ secrets.MY_SYNC_TOKEN }}

      - name: 🔄 Sync From Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          git checkout main
          git reset --hard upstream/master
          
          # Kendi özel anahtarınla (PAT) zorlayarak yaz
          git push https://${{ secrets.MY_SYNC_TOKEN }}@github.com/${{ github.repository }}.git main --force

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          exclude: |
            **/.git*
            **/.github*
