name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions: # Yetki sorununu kökten çözmek için bu blok önemli
      contents: write
    steps:
      - name: 🔍 Checkout My Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Sync from Original Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Orijinal repoyu ekle
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream
          
          # Sizin reponuz 'main' olduğu için main dalına geçiş yapıyoruz
          git checkout main
          
          # Orijinal deponun 'master' dalından çekip sizin 'main' dalınıza birleştiriyoruz
          git merge upstream/master --allow-unrelated-histories -X theirs
          
          # Değişiklikleri kendi reponuza geri yükleyin
          git push origin main

      - name: 🚀 FTP Deploy to Hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          exclude: |
            **/.git*
            **/.github*
