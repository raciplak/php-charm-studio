name: Auto Sync and FTP Deploy

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_SYNC_TOKEN }}

      - name: 🔄 Sync From Upstream
        run: |
          # Güvenli dizin ayarı
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # Kimlik bilgilerini ayarla
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Orijinal repoyu ekle ve çek
          git remote add upstream https://github.com/raciplak/php-charm-studio.git
          git fetch upstream master
          
          # 'main' dalına geç ve orijinal 'master' ile eşitle
          git checkout main
          git reset --hard upstream/master
          
          # YETKİ SORUNUNU AŞAN GÜNCEL PUSH KOMUTU:
          # 'raciplak' kısmını kendi GitHub kullanıcı adınızla değiştirmeyi unutmayın!
          git push https://raciplak:${{ secrets.MY_SYNC_TOKEN }}@github.com/raciplak/php-charm-studio.git main --force

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./public_html/eticaret/php-charm-studio-main/
          exclude: |
            **/.git*
            **/.github*
